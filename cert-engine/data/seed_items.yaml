      - text: "Request 10 fails immediately — circuit is still open (cooldown starts from when circuit opened, not from last request)"
        rationale: "Cooldown starts when the circuit opens (after request 8, at T~15s). After 60 seconds (T=75s), the circuit enters HALF_OPEN. Request 10 at T=65s arrives during the cooldown period (before T=75s), so it fails immediately."
      - text: "Request 10 is attempted (probe request) — circuit enters HALF_OPEN state after cooldown"
        rationale: "Circuit enters HALF_OPEN after cooldown (60s from when it opened). Circuit opened at T~15s (after request 8). Cooldown ends at T=75s. Request 10 at T=65s is 10 seconds BEFORE cooldown ends, so circuit is still OPEN. Request 10 fails immediately."
      - text: "Request 10 succeeds — cooldown elapsed (65s > 60s cooldown period)"
        rationale: "Cooldown is measured from when the circuit opened (T~15s after request 8), not from T=0. Circuit opened at T=15s. Cooldown ends at T=75s (15+60). Request 10 at T=65s is 10 seconds before cooldown ends. Circuit is still OPEN → request 10 fails."
      - text: "Request 10 is attempted (probe) — enough time has passed since the last failed request (request 9 at T=16s)"
        rationale: "HALF_OPEN state is triggered by cooldown period (60s from circuit opening), not by time since last request. Circuit opened at T~15s. Cooldown ends at T=75s. Request 10 at T=65s arrives before cooldown ends → circuit is OPEN, request fails immediately."
    correct_index: 0
    tags: ["circuit-breaker-timing", "cooldown-calculation", "state-transitions"]

  - id: "sys-008"
    domain_id: 4
    objective_id: "4.7"
    cc_level: 3
    status: "pretest"
    discrimination: 1.7
    difficulty: 1.3
    scenario: |
      A System API receives POST /refunds with idempotency key derived from hash(customerId + orderNumber). Request A arrives at T=0 with key="abc123", starts processing (queries Data Cloud, calls Bedrock for AI decision, evaluates policy — takes 8 seconds total). At T=2 (while Request A is still processing), Request B arrives with the same key="abc123" (duplicate/retry). The System API stores the idempotency key in Object Store with TTL=3600s BEFORE starting processing (at T=0 for Request A).

      What should happen to Request B at T=2?
    stem: "What happens to Request B at T=2?"
    options:
      - text: "Request B returns 200 OK immediately with the result from Request A (even though Request A hasn't finished yet)"
        rationale: "Request A hasn't finished yet (finishes at T=8s). The idempotency key exists in Object Store but no result is available yet. Request B should wait or poll for Request A's result, or return HTTP 202 Accepted (processing)."
      - text: "Request B waits until Request A finishes (at T=8s), then returns the same result as Request A"
        rationale: "CORRECT. Idempotency for in-flight requests: Request B sees key exists (Request A is processing), waits for Request A to complete (T=8s), then returns the same result. This prevents duplicate processing and ensures both requests get consistent results."
      - text: "Request B returns HTTP 409 Conflict — duplicate request is already being processed"
        rationale: "HTTP 409 is for conflicts (e.g., trying to create a resource that already exists). For idempotency, don't return an error — return the same result as the original request. Request B should wait for Request A and return its result."
      - text: "Request B processes independently (queries Data Cloud again, calls Bedrock again) because Request A hasn't stored a result yet"
        rationale: "This violates idempotency — both requests would call Bedrock, create duplicate refunds, waste resources. The idempotency key was stored at T=0 (before processing). Request B should detect the key exists and wait for Request A's result."
    correct_index: 1
    tags: ["idempotency", "in-flight-requests", "concurrency"]

  - id: "sf-007"
