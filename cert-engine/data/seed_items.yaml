      - text: "In the AI Gateway itself — configure it to reject requests when overloaded"
        rationale: "The AI Gateway can implement rate limiting (self-protection), but the circuit breaker belongs in the caller (ai-orchestrator). Circuit breakers protect the caller from wasting time on doomed requests and protect the callee from additional load."
      - text: "In both slack-agent-router and ai-orchestrator — defense in depth"
        rationale: "Slack-agent-router doesn't call the AI Gateway (ai-orchestrator does), so a circuit breaker there wouldn't protect the AI Gateway. Circuit breakers should be placed at the layer making the call, not upstream layers."
