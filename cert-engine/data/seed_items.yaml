        rationale: "HTTP 422 is for malformed requests (invalid payload). This request is well-formed; the rejection is a valid business decision. Use HTTP 200 + status field in body."
      - text: "Business outcome — but should return HTTP 201 Created instead of 200 OK"
        rationale: "HTTP 201 is for successful resource creation. This request didn't create anything (it was rejected). HTTP 200 is correct for successful execution that returns a decision."
