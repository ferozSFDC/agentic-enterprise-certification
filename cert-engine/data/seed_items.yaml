      Given these metrics, what operational action should be taken?
    stem: "What operational action is needed?"
    options:
      - text: "POLICY_REJECTED is the most frequent failure (32/47) — review policy rules to see if they're too strict and causing legitimate refunds to be blocked"
        rationale: "POLICY_REJECTED means the AI recommended APPROVE but deterministic policy said DENY (e.g., refund amount > limit, velocity exceeded). These are CORRECT rejections (policy is working as designed). No action needed unless policies need business review (separate from operations)."
      - text: "BEDROCK_UNAVAILABLE (12 occurrences) indicates the AI Gateway or Bedrock service is degraded — increase the circuit breaker cooldown period to reduce load, or investigate why Bedrock is unavailable"
        rationale: "CORRECT. 12 BEDROCK_UNAVAILABLE failures in an hour is significant (one every 5 minutes). This suggests either: (1) Bedrock is experiencing an outage, (2) the circuit breaker is tripping too aggressively, or (3) the AI Gateway has a configuration issue. Investigate + potentially failover to SDK."
      - text: "SERVICE_CLOUD_REJECTED (3 occurrences) means Salesforce is rejecting Case creation — this is the most critical failure because it affects customer-facing actions. Investigate immediately."
        rationale: "3 occurrences in an hour is low frequency (likely individual request issues: missing required fields, bad data, auth failure). Monitor it, but 12 Bedrock failures is higher priority (affects 4× more requests and indicates a systemic issue)."
      - text: "All failures have retryable=false, so retry the entire DLQ batch manually to see if the failures were transient"
        rationale: "retryable=false means the failure is permanent (policy rejection, bad payload, auth failure). Retrying won't help — the same error will occur. Retrying is only useful for retryable=true (transient network failures, timeouts, overload)."
    correct_index: 1
    tags: ["dlq-monitoring", "failure-classification", "operational-response"]

