        rationale: "CORRECT. Luhn checksum validation has a deterministic algorithm: multiply digits, sum, check modulo 10. There is no judgment involved — either the checksum is valid or it isn't. Use deterministic logic for all hard constraints."
      - text: "AI — if confidence is above 0.95, accept; otherwise use deterministic fallback"
        rationale: "This adds unnecessary complexity. Why use AI if you need deterministic fallback anyway? Just use the deterministic algorithm directly. AI should be for judgment calls, not mathematical validations."
