    scenario: |
      A Data Cloud administrator configures Identity Resolution with three data sources: Salesforce CRM (Contacts with Email field), Marketing Cloud (Subscribers with EmailAddress field), and Service Cloud (Cases with CustomerEmail__c field). The mapping is: Contact.Email → ContactPointEmail.EmailAddress, Contact.Id → ContactPointEmail.PartyId. After ingestion, the dashboard shows 5,000 CRM Contacts, 3,000 Marketing Cloud Subscribers, 2,000 Service Cloud Cases. Identity Resolution produces 5,000 Unified Individuals. The administrator expected 8,000 Individuals (all unique customers from all three sources).

      What is the problem with the mapping configuration?
    stem: "Why did Identity Resolution produce 5,000 Individuals instead of 8,000?"
    options:
      - text: "Only CRM Contacts are mapped to ContactPointEmail — Marketing Cloud and Service Cloud data sources are not mapped"
        rationale: "CORRECT. The mapping only includes Contact.Email → ContactPointEmail.EmailAddress. Marketing Cloud Subscribers and Service Cloud Cases are not mapped to ContactPointEmail or Individual DMOs. Identity Resolution only processes mapped sources. Without mapping, those 3,000 + 2,000 records are ignored."
      - text: "The match rule requires exact email match — Marketing Cloud and Service Cloud emails don't match CRM emails"
        rationale: "If all three sources were mapped and match rules found no matches, you'd get 8,000 Individuals (no overlap). But you got 5,000 (exactly the CRM count), which means only CRM is mapped. Marketing Cloud and Service Cloud aren't participating in Identity Resolution."
      - text: "The reconciliation rule 'CRM source priority' causes Marketing Cloud and Service Cloud records to be merged into CRM Individuals"
        rationale: "Reconciliation rules determine which field VALUE to use (e.g., which email if CRM and Marketing Cloud both provide one). They don't merge records into fewer Individuals — that's match rules. 5,000 Individuals = only CRM is mapped."
      - text: "Identity Resolution has a 5,000-record limit — Marketing Cloud and Service Cloud records are queued for the next batch"
        rationale: "Identity Resolution processes all ingested records (no hard limit at 5,000). Getting exactly 5,000 Individuals (the CRM count) indicates only CRM is mapped. Marketing Cloud and Service Cloud need explicit field mappings to participate in Identity Resolution."
    correct_index: 0
    tags: ["data-cloud", "multi-source-mapping", "identity-resolution-scope"]

  - id: "gov-007"
