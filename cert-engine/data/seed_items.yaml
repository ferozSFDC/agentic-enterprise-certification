    scenario: |
      An agentic network consists of 4 apps: (1) data-cloud-sapi (System API, queries Data Cloud), (2) service-cloud-mcp (System API, creates Salesforce Cases), (3) ai-orchestrator (Process layer, calls AI Gateway and both System APIs), (4) slack-agent-router (Experience layer, receives Slack events and calls ai-orchestrator).

      All 4 apps are deployed simultaneously using a CI/CD pipeline. After deployment, the slack-agent-router health check fails with "Connection refused" when trying to reach ai-orchestrator. What is the most likely cause?
    stem: "Why does slack-agent-router health check fail?"
    options:
      - text: "The deployment order is wrong — ai-orchestrator depends on data-cloud-sapi and service-cloud-mcp, but they were deployed at the same time, so ai-orchestrator couldn't connect to them during startup"
        rationale: "If ai-orchestrator couldn't connect to its dependencies, its OWN health check would fail (not slack-agent-router's). The scenario says slack-agent-router's health check fails when reaching ai-orchestrator, implying ai-orchestrator itself isn't ready."
      - text: "The deployment order is wrong — slack-agent-router was deployed before ai-orchestrator finished starting up, so when slack-agent-router's readiness probe tried to call ai-orchestrator, it wasn't listening yet"
        rationale: "CORRECT. Correct deployment order: System APIs first (they have no dependencies), then Process layer (depends on System APIs), then Experience layer (depends on Process layer). Deploying in parallel or reverse order causes 'connection refused' during health checks."
      - text: "The ai-orchestrator is using 0.1 vCore (minimum size), which has a long startup time (~60 seconds), so the slack-agent-router health check timed out before ai-orchestrator was ready"
        rationale: "This is a contributing factor but not the ROOT cause. If you wait longer (or retry the health check), it would eventually succeed. The architectural problem is deploying slack-agent-router BEFORE ai-orchestrator is available. Fix: deploy in dependency order."
      - text: "The ai-orchestrator's health endpoint (/health or /api/health) is misconfigured and returns HTTP 503 even though the app is running correctly"
        rationale: "If ai-orchestrator's health endpoint returned 503, the error would be 'HTTP 503' (not 'connection refused'). 'Connection refused' means the TCP connection failed — the app isn't listening on the port yet (not started)."
    correct_index: 1
    tags: ["deployment-order", "health-checks", "dependency-chain"]

  - id: "ops-002"
    domain_id: 8
    objective_id: "8.2"
    cc_level: 2
    status: "active"
    discrimination: 1.4
    difficulty: 0.2
    scenario: |
      A Mule application requires: (1) a base API URL that differs per environment (dev/staging/prod), (2) an OAuth client_secret that must never be committed to source control, and (3) a default timeout value that is the same across all environments.

      Using the three-tier property strategy, where should each value be stored?
    stem: "Where should each property be stored?"
    options:
      - text: "All three in Runtime Manager encrypted properties (so they're all secure and environment-specific)"
        rationale: "Runtime Manager properties override everything, which works but is operationally heavy (you'd have to set the timeout in EVERY environment even though it's the same). Better: use the hierarchy — defaults in JAR, overrides per env."
      - text: "Base API URL in env-config.yaml (per environment), client_secret in Runtime Manager encrypted properties (secure), default timeout in config.yaml (baked into JAR)"
        rationale: "CORRECT. Three-tier hierarchy: config.yaml (in JAR) = non-sensitive defaults (timeout=30000, retry=3). env-config.yaml (per environment) = environment-specific non-secrets (dev API = dev-api.example.com, prod = prod-api.example.com). Runtime Manager = secrets (client_secret, encryption keys)."
      - text: "All three in config.yaml (in the JAR) with different values per environment using conditional logic (if env==prod then X else Y)"
        rationale: "Conditional logic in config.yaml works but violates 'same artifact different config' principle. You'd have to rebuild the JAR for each environment. Better: externalize environment-specific values to env-config.yaml or Runtime Manager."
      - text: "Base API URL and client_secret in Runtime Manager (environment-specific and secure), default timeout as a hard-coded constant in the Mule XML flow"
        rationale: "Hard-coding timeout in XML makes it non-configurable (you'd have to redeploy to change it). Use config.yaml for defaults. Also, the base API URL isn't secret — it can go in env-config.yaml (easier to manage than Runtime Manager)."
    correct_index: 1
    tags: ["property-hierarchy", "secure-properties", "environment-config"]

  - id: "ops-003"
    domain_id: 8
    objective_id: "8.4"
    cc_level: 3
    status: "active"
    discrimination: 1.3
    difficulty: 0.6
    scenario: |
      A Dead Letter Queue monitoring dashboard shows 47 failures in the past hour with the following breakdown: POLICY_REJECTED (32 occurrences), BEDROCK_UNAVAILABLE (12 occurrences), SERVICE_CLOUD_REJECTED (3 occurrences). All failures have retryable=false.

      Given these metrics, what operational action should be taken?
    stem: "What operational action is needed?"
    options:
      - text: "POLICY_REJECTED is the most frequent failure (32/47) — review policy rules to see if they're too strict and causing legitimate refunds to be blocked"
        rationale: "POLICY_REJECTED means the AI recommended APPROVE but deterministic policy said DENY (e.g., refund amount > limit, velocity exceeded). These are CORRECT rejections (policy is working as designed). No action needed unless policies need business review (separate from operations)."
      - text: "BEDROCK_UNAVAILABLE (12 occurrences) indicates the AI Gateway or Bedrock service is degraded — increase the circuit breaker cooldown period to reduce load, or investigate why Bedrock is unavailable"
        rationale: "CORRECT. 12 BEDROCK_UNAVAILABLE failures in an hour is significant (one every 5 minutes). This suggests either: (1) Bedrock is experiencing an outage, (2) the circuit breaker is tripping too aggressively, or (3) the AI Gateway has a configuration issue. Investigate + potentially failover to SDK."
      - text: "SERVICE_CLOUD_REJECTED (3 occurrences) means Salesforce is rejecting Case creation — this is the most critical failure because it affects customer-facing actions. Investigate immediately."
        rationale: "3 occurrences in an hour is low frequency (likely individual request issues: missing required fields, bad data, auth failure). Monitor it, but 12 Bedrock failures is higher priority (affects 4× more requests and indicates a systemic issue)."
      - text: "All failures have retryable=false, so retry the entire DLQ batch manually to see if the failures were transient"
        rationale: "retryable=false means the failure is permanent (policy rejection, bad payload, auth failure). Retrying won't help — the same error will occur. Retrying is only useful for retryable=true (transient network failures, timeouts, overload)."
    correct_index: 1
    tags: ["dlq-monitoring", "failure-classification", "operational-response"]

