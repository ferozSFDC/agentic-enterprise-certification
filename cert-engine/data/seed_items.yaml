    options:
      - text: "POST /refunds/ORD-5001"
        rationale: "CORRECT. The RAML spec defines /refunds/{orderId} → POST /refunds/ORD-5001. The orderId is a URI parameter (path variable), not a query parameter or body field."
      - text: "POST /refunds?orderId=ORD-5001"
        rationale: "The spec defines {orderId} as a path parameter (/refunds/{orderId}), not a query parameter. Query parameters use ? syntax. This URI doesn't match the RAML spec."
