        rationale: "CORRECT. BEDROCK_UNAVAILABLE is transient (Bedrock was down, now recovered). Retry these 30. POLICY_REJECTED is permanent (policy rule failed, won't change on retry). PAYLOAD_INVALID is permanent (bad data). Don't retry retryable=false."
