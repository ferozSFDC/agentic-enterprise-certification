        rationale: "The orderId is in the URI path (/refunds/{orderId}), not the request body. The body contains amount and reason (per RAML spec), but orderId goes in the path."
      - text: "POST /refunds/{orderId} (literal, with curly braces)"
        rationale: "{orderId} is a placeholder in the RAML spec. In the actual HTTP request, substitute the placeholder with the value: /refunds/ORD-5001 (no curly braces)."
