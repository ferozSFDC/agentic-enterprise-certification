      - text: "SigV4 signing overhead — signing 501 requests exhausted the signing key cache"
        rationale: "SigV4 signing is fast (milliseconds per request) and doesn't have a 'key cache' limit that causes failures at exactly 501 requests. The bottleneck is worker thread exhaustion (Runtime vCores), not signing overhead."
      - text: "OpenAI /chat/completions endpoint incompatibility — Bedrock doesn't support the 501st message format"
        rationale: "If there's an incompatibility, it would fail on request 1 (not 501). The error 'No available workers' is a gateway resource issue (vCores exhausted), not a protocol incompatibility."
