    discrimination: 1.3
    difficulty: 0.4
    scenario: |
      An ai-orchestrator calls the AI Gateway with a 10-second timeout. The AI Gateway is healthy but the Bedrock model is experiencing high latency (15-second responses). The orchestrator has no circuit breaker. After 10 seconds, the call times out.
    stem: "What happens to the AI Gateway's call to Bedrock after the orchestrator timeout?"
    options:
      - text: "The AI Gateway cancels the Bedrock call immediately when the orchestrator times out"
        rationale: "Timeouts are client-side. When the orchestrator times out, it stops waiting for a response, but the AI Gateway's call to Bedrock continues running. The response arrives 15 seconds later (but the orchestrator has moved on)."
      - text: "The AI Gateway continues calling Bedrock; the response arrives after 15 seconds (but the orchestrator has moved on)"
        rationale: "CORRECT. Timeouts don't cancel in-flight requests — they just stop waiting. The AI Gateway → Bedrock call runs for 15 seconds, returns a response (which the orchestrator never receives). This wastes AI Gateway resources. Solution: circuit breaker + shorter timeouts."
      - text: "The AI Gateway retries the Bedrock call automatically after the timeout"
        rationale: "AI Gateway doesn't automatically retry — retries are configured by the caller (orchestrator's until-successful). After timeout, the orchestrator receives an error (timeout exception) and decides whether to retry."
      - text: "The orchestrator automatically retries the AI Gateway call with a longer timeout (15 seconds)"
        rationale: "Orchestrators don't automatically increase timeouts on retry. Timeouts are configured (fixed). If you want adaptive timeouts, you must implement that logic explicitly (not default behavior)."
    correct_index: 1
    tags: ["timeout-behavior", "in-flight-requests", "resource-waste"]

  - id: "sys-006"
    domain_id: 4
    objective_id: "4.4"
    cc_level: 2
    status: "pretest"
    discrimination: 1.2
    difficulty: 0.3
    scenario: |
      A System API receives POST /refunds with body: {customerId: "C123", orderNumber: "ORD-5001", amount: 450}. The API computes idempotency key: hash("C123|ORD-5001|450") = "abc123hash". It queries Salesforce: SELECT Id FROM Refund__c WHERE IdempotencyKey__c = 'abc123hash'. The query returns one record: Id = "R999".
    stem: "What should the System API return?"
    options:
      - text: "HTTP 409 Conflict — this refund request is a duplicate"
        rationale: "HTTP 409 is for conflicts (e.g., trying to create a resource that already exists). For idempotency, return HTTP 200 with the existing resource (R999) — from the caller's perspective, the request 'succeeded' (refund exists)."
      - text: "HTTP 200 OK with body: {refundId: 'R999', status: 'already_processed'}"
        rationale: "CORRECT. Idempotency: same request = same result. The refund already exists (R999), so return it as if the request just succeeded. The caller gets the refund ID and doesn't know this was a retry (transparent idempotency)."
      - text: "HTTP 201 Created with body: {refundId: 'R999'}"
        rationale: "HTTP 201 means a new resource was created THIS request. But R999 was created by a previous request (this is a duplicate). Return HTTP 200 (success, resource exists) not 201 (new resource created)."
      - text: "HTTP 400 Bad Request — duplicate request, client should not retry"
        rationale: "Idempotency makes retries safe (not errors). Returning 400 punishes the caller for retrying. Instead, return 200 with the existing resource (idempotency = retries produce the same result, not errors)."
    correct_index: 1
    tags: ["idempotency", "http-status", "duplicate-handling"]

