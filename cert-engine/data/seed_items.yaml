    stem: "What should the Experience layer do with the duplicate event?"
    options:
      - text: "Process it again — Slack sent it twice, so the user might expect two responses"
        rationale: "Slack's at-least-once delivery guarantee means duplicates are expected (not user-initiated retries). Processing twice would cause duplicate downstream actions (e.g., two refunds for one request). Always deduplicate by event_id."
      - text: "Return 200 OK immediately without processing — it's a duplicate based on event_id"
        rationale: "CORRECT. Store event_id in Object Store before processing. On duplicate, return 200 OK (so Slack doesn't retry again) but skip processing. Idempotency prevents duplicate actions."
      - text: "Return HTTP 409 Conflict to tell Slack this is a duplicate"
        rationale: "Returning non-2xx (like 409) causes Slack to retry. Instead, return 200 OK (acknowledge receipt) but skip processing internally. The deduplication is the Experience layer's responsibility, not Slack's."
      - text: "Process it only if the x-slack-retry-num header is missing"
        rationale: "x-slack-retry-num only appears for timeout retries (Slack didn't get 200 OK in time). At-least-once duplicates arrive without this header. Use event_id for deduplication, not retry headers."
