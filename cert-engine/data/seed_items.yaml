    scenario: |
      A MuleSoft application on CloudHub 2.0 needs to query Salesforce Data Cloud and create Cases in Service Cloud. A Connected App is created with OAuth 2.0 Client Credentials flow, and the client_id and client_secret are copied into the Mule app's secure properties. The app attempts to get an access token from https://login.salesforce.com/services/oauth2/token, but receives HTTP 400 Bad Request: "invalid_client_id".

      What is the most likely cause?
    stem: "Why does token request fail with invalid_client_id?"
    options:
      - text: "The token endpoint should be https://{mydomain}.my.salesforce.com/services/oauth2/token (My Domain), not https://login.salesforce.com, because My Domain is required for Connected App authentication in production orgs"
        rationale: "CORRECT. If the org has My Domain enabled (which is required for Connected Apps), the token endpoint MUST use the My Domain URL, not login.salesforce.com. Using the wrong endpoint returns 'invalid_client_id' even if the credentials are correct."
      - text: "The client_secret is encrypted in the secure properties but the Salesforce connector expects it to be in plaintext in the config.yaml file"
        rationale: "Secure properties are decrypted at runtime by the Mule runtime. The Salesforce connector receives the plaintext secret. This is not the issue. The problem is the token endpoint URL."
      - text: "The Run As user (assigned in the Connected App) does not have the 'API Enabled' permission, so the token request is rejected"
        rationale: "If the Run As user lacks 'API Enabled', the token request might succeed but API calls would fail with insufficient permissions. The error 'invalid_client_id' indicates the client_id itself is not recognized (wrong endpoint or wrong org)."
      - text: "The OAuth scopes (cdp_profile_api, cdp_query_api, api) are incorrect — Data Cloud access requires a special scope called 'data_cloud_admin'"
        rationale: "The scopes cdp_profile_api (profile read), cdp_query_api (SQL query), and api (standard API access) are correct for Data Cloud. There is no 'data_cloud_admin' scope. This error is about the client_id/endpoint, not scopes."
    correct_index: 0
    tags: ["connected-app", "oauth", "my-domain-token-endpoint"]

  - id: "sf-003"
    domain_id: 6
    objective_id: "6.6"
    cc_level: 3
    status: "active"
    discrimination: 1.1
    difficulty: 0.9
    scenario: |
      A System API queries Data Cloud for a customer profile using email "bob@example.com". The two-step query pattern is implemented correctly: (1) SELECT PartyId FROM ssot__ContactPointEmail__dlm WHERE EmailAddress = 'bob@example.com' → returns PartyId = 'abc123'; (2) SELECT FirstName, LastName, LoyaltyTier__c FROM ssot__Individual__dlm WHERE PartyId = 'abc123' → returns ZERO rows.

      Data Cloud Dashboard shows 1 Unified Individual with PartyId = 'abc123'. The custom field LoyaltyTier__c exists on the Individual DMO in the Data Cloud UI. What is the problem?
    stem: "Why does step 2 return zero rows?"
    options:
      - text: "The query is missing a JOIN clause — it should be: SELECT i.FirstName, i.LoyaltyTier__c FROM ssot__Individual__dlm i JOIN ssot__ContactPointEmail__dlm e ON i.PartyId = e.PartyId WHERE e.EmailAddress = 'bob@example.com'"
        rationale: "The two-step query pattern intentionally avoids JOINs for simplicity. Step 1 gets PartyId='abc123', step 2 queries Individual by PartyId='abc123'. If the Individual exists with that PartyId, step 2 should return it. The problem is elsewhere."
      - text: "The custom field API name in the DMO is 'Loyalty_Tier' (with underscore), but the query uses 'LoyaltyTier__c' (no underscore, with __c suffix) — Data Cloud field names are case- and punctuation-sensitive"
        rationale: "CORRECT. This is a common silent failure. Custom fields created in Data Cloud have API names that may differ from their display names. If the query references 'LoyaltyTier__c' but the actual API name is 'Loyalty_Tier' (or 'LoyaltyTier'), the query returns zero rows (not an error — just no match)."
      - text: "Identity Resolution has not refreshed since the custom field was added — run Identity Resolution again to populate LoyaltyTier__c values"
        rationale: "Adding a custom field doesn't require re-running Identity Resolution. The field is added to the DMO schema immediately. If the field has no values, the query would return rows with NULL for LoyaltyTier__c — not zero rows."
      - text: "The PartyId field in the Individual DMO is mapped incorrectly (from Contact.Email instead of Contact.Id), causing the Individual record to have a different PartyId than the ContactPointEmail record"
        rationale: "If the PartyId mapping were wrong, step 1 would return a PartyId (from ContactPointEmail), but step 2 wouldn't find an Individual with that PartyId. However, the scenario says the Dashboard shows 1 Unified Individual with PartyId='abc123', so the mapping is correct. The problem is the field name."
    correct_index: 1
    tags: ["data-cloud", "custom-field-api-name", "silent-failure"]

