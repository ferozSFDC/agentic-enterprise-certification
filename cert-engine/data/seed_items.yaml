        rationale: "If policy rules changed, the business team would notify operations (not automatic retry). Retrying POLICY_REJECTED without confirmation wastes resources (same error). Only retry when you KNOW the failure cause is resolved."
      - text: "Only PAYLOAD_INVALID (5) — smallest batch, least risk"
        rationale: "Batch size doesn't determine retry eligibility. PAYLOAD_INVALID is permanent (bad data won't fix itself on retry). Only retry transient failures (retryable=true), regardless of batch size."
