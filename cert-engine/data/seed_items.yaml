  - id: "exp-010"
    domain_id: 2
    objective_id: "2.9"
    cc_level: 3
    status: "pretest"
    discrimination: 1.6
    difficulty: 0.9
    scenario: |
      Refer to the exhibit. This is a circuit breaker state diagram with three states: CLOSED, OPEN, HALF_OPEN.

      ```
      [CLOSED] --threshold failures--> [OPEN] --cooldown elapsed--> [HALF_OPEN]
         ^                                                                |
         |                                                                |
         +---------------probe success---------------------------------+
                                                                          |
      [OPEN] <-----------------------probe failure---------------------+
      ```

      A circuit breaker is configured with threshold=3, cooldown=60s. At T=0, the circuit is CLOSED. Requests 1-5 succeed. Requests 6-8 fail (3 consecutive failures → circuit opens at T=15s). At T=75s (60s cooldown elapsed), request 9 is sent as a probe. The probe succeeds.

      According to the state diagram, what is the circuit's state after request 9 succeeds?
    stem: "What is the circuit state after the successful probe?"
    options:
      - text: "CLOSED — probe success transitions from HALF_OPEN to CLOSED"
        rationale: "CORRECT. After cooldown (T=75s), circuit enters HALF_OPEN. Request 9 (probe) succeeds → circuit transitions to CLOSED (diagram shows 'probe success' arrow from HALF_OPEN to CLOSED). Subsequent requests proceed normally."
      - text: "HALF_OPEN — probe success keeps the circuit in HALF_OPEN (testing mode)"
        rationale: "HALF_OPEN is a temporary state (one probe request). If probe succeeds, circuit closes (returns to normal). If probe fails, circuit reopens. HALF_OPEN doesn't persist after probe completes."
      - text: "OPEN — probe success doesn't change state, circuit stays OPEN until manual reset"
        rationale: "The diagram shows 'probe success' arrow from HALF_OPEN to CLOSED. Probe success closes the circuit (assumes downstream is healthy). No manual reset needed. Circuit automatically recovers."
      - text: "CLOSED — but requires 3 consecutive successful requests before fully closing (not just one probe)"
        rationale: "Standard circuit breaker pattern: one successful probe in HALF_OPEN → transition to CLOSED. Some implementations require N successful probes, but the standard pattern (shown in diagram) uses one probe. Diagram shows direct transition on 'probe success'."
    correct_index: 0
    tags: ["circuit-breaker-diagram", "state-transitions", "half-open-probe"]
