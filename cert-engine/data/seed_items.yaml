    scenario: |
      An enterprise has 15 AI agents across three teams: Team A (5 agents, development stage, should use Claude 3 Haiku for cost), Team B (7 agents, production, must use Claude 3 Opus for quality), Team C (3 agents, internal tools, can use any model). All agents route through the same Omni Gateway instance. The architect wants to enforce model restrictions at the gateway level based on team membership.

      Each agent's requests include a custom header: x-team-id (values: "team-a", "team-b", "team-c"). How should the gateway policy enforce model restrictions?
    stem: "How should the gateway enforce model restrictions per team?"
    options:
      - text: "Create three separate Omni Gateway instances (one per team) with different model allowlists, route agents to their team's gateway"
        rationale: "This works but requires managing three gateway instances (more operational overhead, more cost). A single gateway with conditional policy based on x-team-id is simpler (one gateway, one policy with team-based rules)."
      - text: "Create one gateway policy with conditional logic: if x-team-id='team-a' require Haiku, if 'team-b' require Opus, if 'team-c' allow any"
        rationale: "CORRECT. Custom gateway policy inspects x-team-id header, validates 'model' parameter based on team rules. Team A requests with model != Haiku → HTTP 403. Team B requests with model != Opus → HTTP 403. Team C requests → allow any model. Centralized, scalable, single gateway."
      - text: "Store team-model mappings in a Salesforce custom object, have each agent query it before calling the gateway"
        rationale: "This requires every agent to query Salesforce before each LLM call (adds latency, requires database access). Platform-level enforcement (gateway policy) is automatic, faster, and doesn't require agents to 'opt in'."
      - text: "Configure Agent Fabric role-based access control (RBAC): Team A role → Haiku only, Team B role → Opus only, Team C role → all models"
        rationale: "Agent Fabric (as of 2024) doesn't have built-in RBAC for model restrictions. Custom gateway policies (option B) are the standard way to enforce conditional logic based on headers/metadata. This would be a nice feature but doesn't exist yet."
    correct_index: 1
    tags: ["conditional-policy", "multi-team-governance", "header-based-routing"]
