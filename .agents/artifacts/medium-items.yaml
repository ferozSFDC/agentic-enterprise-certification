    difficulty: 0.8
    scenario: |
      A System API (POST /customers/{id}/update-tier) updates loyalty tier in Salesforce. It's currently called by Mule apps via REST. A new requirement: "Expose this API as an MCP tool for AI agents." The API has no custom logic (pass-through to Salesforce) but requires OAuth authentication (Bearer token from Connected App).
    stem: "What is the fastest way to expose this API as an MCP tool?"
    options:
      - text: "Use MCP Bridge (no-code wizard) to auto-generate an MCP server from the existing REST API spec"
        rationale: "CORRECT. MCP Bridge takes an OpenAPI/RAML spec, generates agent-network.yaml entry + MCP server wrapper, preserves authentication (OAuth). No custom code needed for simple pass-throughs. Save hand-coded MCP for complex stateful logic."
      - text: "Write a hand-coded MCP server in TypeScript that wraps the REST API and handles OAuth token refresh"
        rationale: "MCP Bridge handles OAuth token management automatically (via tool schema authentication config). Hand-coding is unnecessary overhead for a simple pass-through. Use Bridge unless you need custom validation or transformations."
      - text: "Modify the existing REST API to accept MCP tool invocations (add /mcp/invoke endpoint)"
        rationale: "MCP tools and REST APIs are separate protocols. MCP uses JSON-RPC (not REST). Use MCP Bridge to create an MCP wrapper that translates MCP → REST. Don't mix protocols in one API."
      - text: "Register the REST API directly in agent-network.yaml with protocol: REST (agents will call it via HTTP)"
        rationale: "Agents invoke tools via MCP protocol, not REST. If you register a REST endpoint, agents won't know how to call it (no MCP contract). MCP Bridge creates the MCP wrapper that translates MCP tool calls → REST API calls."
    correct_index: 0
    tags: ["mcp-bridge", "tool-exposure", "no-code"]

  - id: "ops-005"
    domain_id: 8
    objective_id: "8.5"
    cc_level: 2
    status: "pretest"
    discrimination: 1.2
    difficulty: 0.3
    scenario: |
      A Mule application has three property files: config.yaml (in JAR), env-config.yaml (external, per environment), and Runtime Manager encrypted properties. The same property key 'api.timeout' appears in all three with values: 5000 (config.yaml), 8000 (env-config.yaml), 10000 (Runtime Manager).
    stem: "What value does the app use at runtime?"
    options:
      - text: "5000 — config.yaml is loaded first"
        rationale: "Property precedence is not load order — it's override order. Runtime Manager > env-config.yaml > config.yaml. The app uses 10000 (Runtime Manager overrides everything)."
      - text: "10000 — Runtime Manager properties override all others"
        rationale: "CORRECT. Three-tier property hierarchy: config.yaml (defaults in JAR) < env-config.yaml (per-environment overrides) < Runtime Manager (secrets + emergency overrides). Runtime Manager has highest precedence."
      - text: "8000 — env-config.yaml is environment-specific and overrides config.yaml"
        rationale: "env-config.yaml does override config.yaml (8000 > 5000), but Runtime Manager overrides both (10000 > 8000 > 5000). Runtime Manager is the top tier (highest precedence)."
      - text: "The app throws an error — duplicate property keys are not allowed"
        rationale: "Duplicate keys across tiers are intentional (override pattern). The app merges properties with precedence: Runtime Manager > env-config > config.yaml. No error thrown."
    correct_index: 1
    tags: ["property-hierarchy", "runtime-manager", "override-precedence"]

  - id: "ops-006"
    domain_id: 8
    objective_id: "8.6"
    cc_level: 3
    status: "active"
    discrimination: 1.5
    difficulty: 0.7
    scenario: |
      A Dead Letter Queue (DLQ) shows 50 failures in the past hour: BEDROCK_UNAVAILABLE (30), POLICY_REJECTED (15), PAYLOAD_INVALID (5). All BEDROCK_UNAVAILABLE failures have retryable=true. All POLICY_REJECTED failures have retryable=false. PAYLOAD_INVALID failures have retryable=false.
    stem: "Which failures should be retried from the DLQ?"
    options:
      - text: "All 50 — DLQ replay should attempt all failures"
        rationale: "Retrying retryable=false failures (POLICY_REJECTED, PAYLOAD_INVALID) will produce the same error (policy still fails, payload still invalid). Only retry retryable=true failures (transient issues like BEDROCK_UNAVAILABLE)."
      - text: "Only BEDROCK_UNAVAILABLE (30) — retryable=true means transient failure"
        rationale: "CORRECT. BEDROCK_UNAVAILABLE is transient (Bedrock was down, now recovered). Retry these 30. POLICY_REJECTED is permanent (policy rule failed, won't change on retry). PAYLOAD_INVALID is permanent (bad data). Don't retry retryable=false."
      - text: "Only POLICY_REJECTED (15) — policy rules might have changed, worth retrying"
        rationale: "If policy rules changed, the business team would notify operations (not automatic retry). Retrying POLICY_REJECTED without confirmation wastes resources (same error). Only retry when you KNOW the failure cause is resolved."
      - text: "Only PAYLOAD_INVALID (5) — smallest batch, least risk"
        rationale: "Batch size doesn't determine retry eligibility. PAYLOAD_INVALID is permanent (bad data won't fix itself on retry). Only retry transient failures (retryable=true), regardless of batch size."
    correct_index: 1
    tags: ["dlq-retry", "retryable-flag", "transient-vs-permanent"]
